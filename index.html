<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wemert Group Realty | Orlando Homes</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f9;color:#222}
    header{background:linear-gradient(135deg,#0a2a66,#123b8a);color:#fff;padding:30px;text-align:center}
    header h1{margin:0;font-size:2.2rem}
    header p{margin-top:8px;opacity:.9}
    .container{padding:20px;max-width:1200px;margin:auto}
    .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;background:#fff;padding:16px;border-radius:12px;margin-bottom:25px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
    .filters select,.filters button{padding:12px;border-radius:8px;border:1px solid #ddd;font-size:15px}
    .filters button{background:#0a2a66;color:#fff;border:none;cursor:pointer}
    .filters button:hover{background:#123b8a}
    .listings{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px}
    .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.1);display:flex;flex-direction:column}
    .card img{width:100%;height:210px;object-fit:cover}
    .card-content{padding:16px;flex:1}
    .card-content h3{margin:0 0 6px;font-size:1.1rem}
    .price{color:#0a2a66;font-weight:700;font-size:1.2rem;margin:8px 0}
    .icons{display:flex;gap:14px;font-size:.9rem;color:#555;margin-bottom:10px}
    .icons i{color:#0a2a66}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
    .actions a{padding:10px;text-align:center;border-radius:8px;font-size:.9rem;text-decoration:none;font-weight:600}
    .details{background:#e9eef8;color:#0a2a66}
    .contact{background:#0a2a66;color:#fff}
    footer{background:#0a2a66;color:#fff;text-align:center;padding:25px;margin-top:40px}
    footer a{color:#fff;text-decoration:none;font-weight:600}
  </style>
</head>
<body><header>
  <h1>Wemert Group Realty</h1>
  <p>30 Unique Affordable Homes Across Orlando, Florida</p>
</header><div class="container">  <div class="filters">
    <select id="priceFilter">
      <option value="">Select Max Price</option>
      <option value="150000">$150,000</option>
      <option value="200000">$200,000</option>
      <option value="250000">$250,000</option>
      <option value="300000">$300,000</option>
      <option value="350000">$350,000</option>
    </select>
    <select id="bedFilter">
      <option value="">Bedrooms</option>
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
    </select>
    <button onclick="filterHomes()"><i class="fa-solid fa-magnifying-glass"></i> Search Homes</button>
  </div>  <div class="listings" id="listings"></div></div><footer>
  <p><strong>Wemert Group Realty</strong></p>
  <p>
    <i class="fa-solid fa-envelope"></i>
    <a href="mailto:GRealtyGroup1@gmail.com?subject=Home%20Viewing%20Appointment">GRealtyGroup1@gmail.com</a>
  </p>
  <p>
    <a href="mailto:GRealtyGroup1@gmail.com?subject=Schedule%20a%20Meeting">📅 Schedule a Meeting</a>
  </p>
</footer><script>
const homes = [

  {price:185000,beds:3,loc:"College Park",img:"https://source.unsplash.com/800x600/?orlando,house,5"},
  {price:195000,beds:2,loc:"South Semoran",img:"https://source.unsplash.com/800x600/?orlando,house,6"},
  {price:205000,beds:3,loc:"Metrowest",img:"https://source.unsplash.com/800x600/?orlando,house,7"},
  {price:215000,beds:4,loc:"Hunters Creek",img:"https://source.unsplash.com/800x600/?orlando,house,8"},

  {price:235000,beds:2,loc:"Dr. Phillips",img:"https://source.unsplash.com/800x600/?orlando,house,10"},
  {price:245000,beds:4,loc:"Waterford Lakes",img:"https://source.unsplash.com/800x600/?orlando,house,11"},

  {price:295000,beds:2,loc:"Ocoee",img:"https://source.unsplash.com/800x600/?orlando,house,16"},
  {price:305000,beds:4,loc:"Windermere",img:"https://source.unsplash.com/800x600/?orlando,house,17"},
  {price:315000,beds:3,loc:"Winter Garden",img:"https://source.unsplash.com/800x600/?orlando,house,18"},

];

function render(list){
  const el=document.getElementById('listings');
  el.innerHTML='';
  list.forEach(h=>{
    el.innerHTML+=`
    <div class="card">
      <img src="${h.img}" alt="House in ${h.loc}">
      <div class="card-content">
        <h3>${h.loc}, Orlando</h3>
        <div class="price">$${h.price.toLocaleString()}</div>
        <div class="icons">
          <span><i class="fa-solid fa-bed"></i> ${h.beds} Beds</span>
          <span><i class="fa-solid fa-location-dot"></i> Florida</span>
        </div>
      </div>
      <div class="actions">
        <a class="details" href="mailto:GRealtyGroup1@gmail.com?subject=Details%20for%20${h.loc}">View Details</a>
        <a class="contact" href="mailto:GRealtyGroup1@gmail.com?subject=Schedule%20Viewing%20-%20${h.loc}">Schedule Visit</a>
      </div>
    </div>`;
  });
}

function filterHomes(){
  const p=document.getElementById('priceFilter').value;
  const b=document.getElementById('bedFilter').value;
  const f=homes.filter(h=>(!p||h.price<=p)&&(!b||h.beds>=b));
  render(f);
}

render(homes);
</script></body>
</html>
