<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wemert Group Realty</title>

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6f9}
header{background:#0a2a66;color:#fff;padding:20px;text-align:center}
.filters{background:#fff;padding:15px}
.filters select,.filters button{width:100%;padding:12px;margin-top:10px;font-size:16px}
.listings{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.card img{width:100%;height:200px;object-fit:cover;display:block}
.card-content{padding:12px}
.icons{color:#555;font-size:14px;margin-bottom:8px}
.card button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px;background:#0a2a66;color:#fff;font-size:16px}
footer{background:#0a2a66;color:#fff;text-align:center;padding:15px}
</style>
</head>

<body>

<header>
<h1>Wemert Group Realty</h1>
<p>Affordable Homes Across Orlando, Florida</p>
</header>

<div class="filters">
<select id="priceFilter">
<option value="">Max Price</option>
<option value="250000">$250,000</option>
<option value="300000">$300,000</option>
<option value="350000">$350,000</option>
<option value="400000">$400,000</option>
<option value="500000">$500,000</option>
</select>

<select id="bedFilter">
<option value="">Min Bedrooms</option>
<option value="2">2+</option>
<option value="3">3+</option>
<option value="4">4+</option>
<option value="5">5+</option>
</select>

<button onclick="filterHomes()">Search Homes</button>
</div>

<div class="listings" id="listings"></div>

<footer>
<p><strong>Wemert Group Realty</strong></p>
<p>📧 jwemertgrouprealty1@gmail.com</p>
<p>📞 407-435-5072</p>
</footer>

<script>
const homes=[
{img:101,price:185000,bed:2,loc:"Lake Nona"},
{img:102,price:195000,bed:3,loc:"Winter Park"},
{img:103,price:205000,bed:3,loc:"Kissimmee"},
{img:104,price:215000,bed:2,loc:"Altamonte Springs"},
{img:105,price:225000,bed:3,loc:"Oviedo"},
{img:106,price:235000,bed:4,loc:"Apopka"},
{img:107,price:245000,bed:3,loc:"Casselberry"},
{img:108,price:255000,bed:4,loc:"Sanford"},
{img:109,price:265000,bed:3,loc:"Ocoee"},
{img:110,price:275000,bed:4,loc:"Clermont"},
{img:111,price:285000,bed:3,loc:"Maitland"},
{img:112,price:295000,bed:4,loc:"Dr Phillips"},
{img:113,price:305000,bed:4,loc:"Union Park"},
{img:114,price:315000,bed:5,loc:"Pine Hills"},
{img:115,price:325000,bed:4,loc:"Belle Isle"},
{img:116,price:335000,bed:5,loc:"Edgewood"},
{img:117,price:345000,bed:4,loc:"Winter Garden"},
{img:118,price:355000,bed:5,loc:"Windermere"},
{img:119,price:365000,bed:4,loc:"Horizon West"},
{img:120,price:375000,bed:5,loc:"Lake Mary"},
{img:121,price:385000,bed:4,loc:"College Park"},
{img:122,price:395000,bed:5,loc:"Baldwin Park"},
{img:123,price:405000,bed:4,loc:"MetroWest"},
{img:124,price:415000,bed:5,loc:"Doctor Phillips"},
{img:125,price:425000,bed:4,loc:"Celebration"},
{img:126,price:435000,bed:5,loc:"Hunters Creek"},
{img:127,price:445000,bed:4,loc:"Lake Hart"},

{img:129,price:465000,bed:4,loc:"Conway"},
{img:130,price:475000,bed:5,loc:"Azalea Park"}
];

function render(list){
const box=document.getElementById("listings");
box.innerHTML="";
list.forEach(h=>{
box.innerHTML+=`
<div class="card">
<img src="https://picsum.photos/id/${h.img}/800/500" alt="House in ${h.loc}">
<div class="card-content">
<h3>$${h.price.toLocaleString()}</h3>
<p>${h.loc}, Orlando FL</p>
<p class="icons">🛏 ${h.bed} Bedrooms</p>
<button onclick="email('${h.loc}')">View Details / Schedule Visit</button>
</div>
</div>`;
});
}

function filterHomes(){
const p=document.getElementById("priceFilter").value;
const b=document.getElementById("bedFilter").value;
render(homes.filter(h=>(!p||h.price<=p)&&(!b||h.bed>=b)));
}

function email(loc){
window.location.href=`mailto:jwemertgrouprealty1@gmail.com?subject=House Inquiry - ${loc}`;
}

render(homes);
</script>

</body>
</html>
